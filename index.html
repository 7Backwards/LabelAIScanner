<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label AI - Food Scanner</title>
  <meta name="description" content="Scan any ingredient label and instantly understand what's in your food." />
  <link rel="icon" type="image/png" href="appicon.png" />
  <link rel="alternate" hreflang="en" href="https://7backwards.github.io/LabelAIScanner-Public/en/" />
  <link rel="alternate" hreflang="pt" href="https://7backwards.github.io/LabelAIScanner-Public/pt/" />
  <link rel="alternate" hreflang="es" href="https://7backwards.github.io/LabelAIScanner-Public/es/" />
  <link rel="alternate" hreflang="fr" href="https://7backwards.github.io/LabelAIScanner-Public/fr/" />
  <link rel="alternate" hreflang="x-default" href="https://7backwards.github.io/LabelAIScanner-Public/en/" />
  <script>
    (function () {
      var langMap = {
        pt: "pt", "pt-br": "pt", "pt-pt": "pt",
        es: "es", "es-mx": "es", "es-ar": "es", "es-co": "es", "es-cl": "es", "es-pe": "es", "es-ve": "es", "es-ec": "es", "es-gt": "es", "es-cu": "es", "es-bo": "es", "es-do": "es", "es-hn": "es", "es-py": "es", "es-sv": "es", "es-ni": "es", "es-cr": "es", "es-pa": "es", "es-uy": "es", "es-pr": "es",
        fr: "fr", "fr-fr": "fr", "fr-ca": "fr", "fr-be": "fr", "fr-ch": "fr",
        en: "en", "en-us": "en", "en-gb": "en", "en-au": "en", "en-ca": "en", "en-nz": "en", "en-za": "en", "en-ie": "en", "en-in": "en",
      };
      var saved = localStorage.getItem("lang");
      if (saved && langMap[saved]) {
        window.location.replace(saved + "/");
        return;
      }
      var browserLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      var lang = langMap[browserLang] || langMap[browserLang.split("-")[0]] || "en";
      localStorage.setItem("lang", lang);
      window.location.replace(lang + "/");
    })();
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0;url=en/" />
    <p>Redirecting to <a href="en/">English version</a>...</p>
  </noscript>
</body>
</html>
